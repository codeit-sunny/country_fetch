<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h3>Ajax and Json - (API- Application programming interface)</h3>
    <!-- How Work Ajax
    1. An event occur like button click from submit
    2. xmlhttpRequest object is created by js
    3. xmlhttpRequest send the request to the server
    4. server process the request
    5. server send the response
    6. response read by js
    7. Take the action by js -->
    <div class="parent">
        <div class="first" onsubmit="getapiPromise(); return false">
            <form>
                <label>Enter the country Name.</label>
                <input type="text" placeholder="Enter Country name" id="search">
                <button type="submit">Search</button>
            </form>
        </div>
        <div class="second"></div>
    </div>
    




    <script src="script.js"></script>
</body>

</html>
